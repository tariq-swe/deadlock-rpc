name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: deadlock-rpc
            zip: deadlock-rpc-setup-linux-x86_64.zip

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: deadlock-rpc.exe
            zip: deadlock-rpc-setup-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p package/deadlock-rpc/logs
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} package/deadlock-rpc/deadlock-rpc
          cp -r assets package/deadlock-rpc/assets
          cd package && zip -r ../${{ matrix.zip }} deadlock-rpc/

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          New-Item -ItemType Directory -Force -Path package\deadlock-rpc\logs | Out-Null
          Copy-Item target\${{ matrix.target }}\release\${{ matrix.binary }} package\deadlock-rpc\deadlock-rpc.exe
          Copy-Item -Recurse assets package\deadlock-rpc\assets
          Compress-Archive -Path package\deadlock-rpc -DestinationPath ${{ matrix.zip }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.zip }}
          path: ${{ matrix.zip }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            deadlock-rpc-setup-linux-x86_64.zip
            deadlock-rpc-setup-windows-x86_64.zip
          generate_release_notes: true
